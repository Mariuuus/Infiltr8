name: Unity Build CI/CD
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true

jobs:
  buildForLinux:
    name: Build for ${{ matrix.targetPlatform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneLinux64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - uses: actions/cache@v3
        with:
          path: INFiltr8/Library
          key: Library-INFiltr8-${{ matrix.targetPlatform }}-${{ hashFiles('INFiltr8') }}
          restore-keys: |
            Library-INFiltr8-${{ matrix.targetPlatform }}-
            Library-INFiltr8-
            Library-
      - uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: INFiltr8
          unityVersion: 6000.0.75f1
          targetPlatform: ${{ matrix.targetPlatform }}
      - name: Zip build
        run: zip -r Build-${{ matrix.targetPlatform }}.zip build/${{ matrix.targetPlatform }}
      - uses: actions/upload-artifact@v4
        with:
          name: Build-${{ matrix.targetPlatform }}
          path: Build-${{ matrix.targetPlatform }}.zip

  buildForWindows:
    name: Build for ${{ matrix.targetPlatform }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneWindows64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - uses: actions/cache@v3
        with:
          path: INFiltr8/Library
          key: Library-INFiltr8-${{ matrix.targetPlatform }}-${{ hashFiles('INFiltr8') }}
          restore-keys: |
            Library-INFiltr8-${{ matrix.targetPlatform }}-
            Library-INFiltr8-
            Library-
      - uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: INFiltr8
          unityVersion: 6000.0.75f1
          targetPlatform: ${{ matrix.targetPlatform }}
      - name: Zip build
        run: Compress-Archive -Path build\${{ matrix.targetPlatform }} -DestinationPath Build-${{ matrix.targetPlatform }}.zip
      - uses: actions/upload-artifact@v4
        with:
          name: Build-${{ matrix.targetPlatform }}
          path: Build-${{ matrix.targetPlatform }}.zip

  release:
    name: Publish GitHub Release
    needs: [buildForLinux, buildForWindows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          files: artifacts/**/*.zip
